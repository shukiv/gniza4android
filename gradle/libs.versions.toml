[versions]
kotlin = "2.1.10"
agp = "8.7.3"
ksp = "2.1.10-1.0.29"

composeBom = "2024.12.01"
activityCompose = "1.9.3"
lifecycleRuntime = "2.8.7"
navigation = "2.8.5"

room = "2.6.1"
hilt = "2.53.1"
