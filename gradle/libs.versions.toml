jsch = "0.2.21"
timber = "5.0.1"
zxingCpp = "3.0.2"
cameraX = "1.4.1"

coreKtx = "1.15.0"
appcompat = "1.7.0"
material = "1.12.0"

junit = "4.13.2"
testExtJunit = "1.2.1"
espresso = "3.6.1"

[libraries]
compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "composeBom" }
compose-ui = { group = "androidx.compose.ui", name = "ui" }
